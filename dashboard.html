<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Traders — Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .dash-header {
      display: flex; align-items: center; gap: 20px;
      margin-bottom: 32px;
    }
    .dash-info h2 {
      font-family: var(--font-display);
      font-size: 22px; font-weight: 800;
    }
    .dash-info p { color: var(--text-muted); font-size: 13px; }
    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .accounts-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .accounts-header h3 {
      font-family: var(--font-display);
      font-size: 16px; font-weight: 700;
    }
    .account-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 12px;
      display: flex; align-items: center; justify-content: space-between;
      transition: border-color 0.2s;
    }
    .account-card:hover { border-color: var(--border-bright); }
    .account-info h4 {
      font-family: var(--font-display);
      font-size: 14px; font-weight: 700;
    }
    .account-info p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .account-stats { display: flex; gap: 24px; align-items: center; }
    .privacy-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px;
    }
    .privacy-card h3 { font-family: var(--font-display); font-size: 14px; font-weight: 700; }
    .privacy-card p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .toggle-wrap { display: flex; align-items: center; gap: 10px; }
    .toggle {
      position: relative; width: 44px; height: 24px;
      background: var(--bg3); border-radius: 12px;
      border: 1px solid var(--border);
      cursor: pointer; transition: all 0.2s;
    }
    .toggle.on { background: var(--blue); border-color: var(--blue); }
    .toggle::after {
      content: ''; position: absolute;
      top: 3px; left: 3px;
      width: 16px; height: 16px;
      background: #fff; border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle.on::after { transform: translateX(20px); }
    .toggle-label { font-size: 12px; color: var(--text-dim); }
    .share-card {
      background: var(--blue-dim);
      border: 1px solid var(--border-bright);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px;
    }
    .share-card p { font-size: 13px; color: var(--blue-bright); }
    .share-card span { font-size: 11px; color: var(--text-muted); display: block; margin-top: 2px; }
    @media (max-width: 768px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
      .account-card { flex-direction: column; align-items: flex-start; gap: 12px; }
      .account-stats { gap: 16px; }
    }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="index.html">Social<span>Traders</span></a>
    <div class="nav-links"></div>
    <div class="nav-auth"></div>
  </nav>

  <div class="page">
    <div class="container">

      <!-- HEADER -->
      <div class="dash-header fade-up">
        <div class="avatar avatar-lg" id="avatar-letter">?</div>
        <div class="dash-info">
          <h2 id="dash-username">Memuat...</h2>
          <p id="dash-email"></p>
        </div>
      </div>

      <!-- PRIVASI -->
      <div class="privacy-card fade-up">
        <div>
          <h3>Visibilitas Profil</h3>
          <p id="privacy-desc">Atur apakah profil dan statistikmu bisa dilihat publik</p>
        </div>
        <div class="toggle-wrap">
          <span class="toggle-label" id="privacy-label">Memuat...</span>
          <div class="toggle" id="toggle-privacy" onclick="togglePrivacy()"></div>
        </div>
      </div>

      <!-- SHARE CARD -->
      <div class="share-card fade-up" id="share-section" style="display:none">
        <div>
          <p id="share-url"></p>
          <span>Link profil publik kamu</span>
        </div>
        <button class="btn btn-primary btn-sm" onclick="copyLink()">Salin Link</button>
      </div>

      <!-- STATS -->
      <div class="stats-row fade-up" id="stats-row">
        <div class="stat-card">
          <div class="stat-value" id="stat-akun">-</div>
          <div class="stat-label">Total Akun</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-saldo">-</div>
          <div class="stat-label">Total Saldo</div>
        </div>
        <div class="stat-card">
          <div class="stat-value stat-up" id="stat-profit">-</div>
          <div class="stat-label">Rata-rata Profit %</div>
        </div>
      </div>

      <!-- AKUN TRADING -->
      <div class="accounts-header">
        <h3>Akun Trading MT5</h3>
        <button class="btn btn-primary btn-sm" onclick="openModal()">+ Tambah Akun</button>
      </div>

      <div id="accounts-list">
        <div class="empty-state"><p>Memuat data akun...</p></div>
      </div>

    </div>
  </div>

  <!-- MODAL TAMBAH AKUN -->
  <div class="modal-overlay" id="modal-tambah">
    <div class="modal">
      <h3 class="modal-title">Tambah Akun MT5</h3>
      <form onsubmit="handleTambahAkun(event)">
        <div class="form-group">
          <label>Nomor Akun MT5</label>
          <input type="text" id="akun-nomor" placeholder="Contoh: 12345678" required>
        </div>
        <div class="form-group">
          <label>Nama Server Broker</label>
          <input type="text" id="akun-server" placeholder="Contoh: Exness-Real4" required>
        </div>
        <div class="form-group">
          <label>Saldo Awal (USD)</label>
          <input type="number" id="akun-saldo" placeholder="Contoh: 1000" step="0.01" required>
        </div>
        <div class="form-group">
          <label>Profit % (opsional)</label>
          <input type="number" id="akun-profit" placeholder="Contoh: 12.5" step="0.01" value="0">
        </div>
        <div style="display:flex; gap:10px; margin-top:8px;">
          <button type="button" class="btn btn-ghost btn-full" onclick="closeModal()">Batal</button>
          <button type="submit" class="btn btn-primary btn-full" id="btn-tambah">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast"></div>
  <script src="app.js"></script>
  <script>
    // Guard: harus login
    if (!Auth.isLoggedIn()) window.location.href = 'index.html';

    renderNav('dashboard.html');

    let isPublic = false;
    let currentUsername = '';

    async function loadDashboard() {
      try {
        const data = await apiFetch('/user/dashboard');
        const user = Auth.getUser();
        currentUsername = data.user;

        // Header
        document.getElementById('avatar-letter').textContent = avatarLetter(data.user);
        document.getElementById('dash-username').textContent = data.user;
        document.getElementById('dash-email').textContent = data.email || '';

        // Stats
        const totalSaldo = data.daftar_akun.reduce((s, a) => s + a.saldo, 0);
        const avgProfit = data.daftar_akun.length
          ? (data.daftar_akun.reduce((s, a) => s + (a.profit_persen || 0), 0) / data.daftar_akun.length).toFixed(2)
          : '0.00';
        document.getElementById('stat-akun').textContent = data.total_akun;
        document.getElementById('stat-saldo').textContent = '$' + totalSaldo.toLocaleString('en-US', {minimumFractionDigits: 2});
        document.getElementById('stat-profit').textContent = avgProfit + '%';

        // Privacy
        const profil = await apiFetch('/profil');
        isPublic = profil.data_user.profil_publik;
        updatePrivacyUI();

        // Render accounts
        renderAccounts(data.daftar_akun);
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    function renderAccounts(list) {
      const container = document.getElementById('accounts-list');
      if (!list.length) {
        container.innerHTML = `<div class="empty-state">
          <p>Belum ada akun trading. Tambahkan akun MT5 pertamamu.</p>
        </div>`;
        return;
      }
      container.innerHTML = list.map(a => `
        <div class="account-card fade-up">
          <div class="account-info">
            <h4>${a.nomor_akun}</h4>
            <p>${a.server}</p>
          </div>
          <div class="account-stats">
            <div>
              <div class="stat-value" style="font-size:16px">$${Number(a.saldo).toLocaleString('en-US', {minimumFractionDigits:2})}</div>
              <div class="stat-label">Saldo</div>
            </div>
            <div>
              <div class="stat-value ${(a.profit_persen||0) >= 0 ? 'stat-up' : 'stat-down'}" style="font-size:16px">
                ${(a.profit_persen||0) >= 0 ? '+' : ''}${(a.profit_persen||0).toFixed(2)}%
              </div>
              <div class="stat-label">Profit</div>
            </div>
            <span class="badge badge-blue">MT5</span>
          </div>
        </div>
      `).join('');
    }

    function updatePrivacyUI() {
      const toggle = document.getElementById('toggle-privacy');
      const label = document.getElementById('privacy-label');
      const share = document.getElementById('share-section');
      toggle.classList.toggle('on', isPublic);
      label.textContent = isPublic ? 'Publik' : 'Private';
      if (isPublic) {
        share.style.display = 'flex';
        document.getElementById('share-url').textContent =
          `${location.origin}/profil.html?user=${currentUsername}`;
      } else {
        share.style.display = 'none';
      }
    }

    async function togglePrivacy() {
      try {
        isPublic = !isPublic;
        await apiFetch(`/user/update-privasi?status_baru=${isPublic}`, { method: 'PUT' });
        updatePrivacyUI();
        showToast(`Profil diubah ke ${isPublic ? 'Publik' : 'Private'}`, 'success');
      } catch (err) {
        isPublic = !isPublic;
        showToast(err.message, 'error');
      }
    }

    function copyLink() {
      const url = `${location.origin}/profil.html?user=${currentUsername}`;
      navigator.clipboard.writeText(url);
      showToast('Link disalin!', 'success');
    }

    function openModal() { document.getElementById('modal-tambah').classList.add('open'); }
    function closeModal() { document.getElementById('modal-tambah').classList.remove('open'); }

    async function handleTambahAkun(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-tambah');
      btn.textContent = 'Menyimpan...'; btn.disabled = true;
      try {
        await apiFetch('/tambah-akun-trading', {
          method: 'POST',
          body: JSON.stringify({
            nomor_akun: document.getElementById('akun-nomor').value,
            nama_server: document.getElementById('akun-server').value,
            saldo: parseFloat(document.getElementById('akun-saldo').value),
            profit_persen: parseFloat(document.getElementById('akun-profit').value || 0)
          })
        });
        showToast('Akun berhasil ditambahkan!', 'success');
        closeModal();
        loadDashboard();
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        btn.textContent = 'Simpan'; btn.disabled = false;
      }
    }

    loadDashboard();
  </script>
</body>
</html>
